— which is essentially none.\n\n---\n\n## 2. No Registration, No Accounts\n\nThe App does not require you to create an account, log in, or provide any personal information whatsoever to use any feature, including multiplayer.\n\n---\n\n## 3. No Data Collection or Storage\n\nWe do not collect, store, transmit, or process any personal data. Specifically:\n\n- We do not collect your name, email, phone number, or any other identifier.\n- We do not store game history, match results, or any gameplay data — on your device or on any server.\n- We have no database. There is no backend storage of any kind.\n- Multiplayer functionality is handled entirely in real-time with no records retained once a session ends.\n- We do not use cookies or any equivalent tracking technology.\n- We do not collect device identifiers, IP addresses, or location data.\n- We do not use analytics SDKs or crash-reporting tools that transmit personal data.\n\n---\n\n## 4. In-App Advertising\n\nThe App displays advertisements provided by third-party ad networks. **We do not control what data these ad networks collect.** Ad networks may independently collect certain information in accordance with their own privacy policies, such as:\n\n- Device advertising identifiers (e.g., IDFA on iOS, GAID on Android)\n- General device information (device type, OS version)\n- Ad interaction data (impressions, clicks)\n\nYou may limit ad tracking through your device settings:\n\n- **iOS:** Settings → Privacy \u0026 Security → Tracking → disable \"Allow Apps to Request to Track\"\n- **Android:** Settings → Google → Ads → \"Delete advertising ID\" or opt out of personalized ads\n\nWe recommend reviewing the privacy policies of our ad network partners:\n\n- [Ad Network Name \u0026 Link — e.g., Google AdMob: https://policies.google.com/privacy]\n- [Add additional networks as applicable]\n\n---\n\n## 5. Multiplayer\n\nMultiplayer sessions are conducted in real-time. No player information, moves, chat, or results are stored at any point. When a session ends, no record of it exists anywhere.\n\n---\n\n## 6. Children's Privacy\n\nBecause we collect no personal data from any user, the App is safe for all ages. We do not knowingly collect information from children under 13 (or under 16 in applicable jurisdictions), and in fact collect no information from anyone at all.\n\nIf you are a parent or guardian and have concerns, please contact us — though there is no personal data for us to access or delete.\n\n---\n\n## 7. Third-Party Links or Services\n\nBeyond the ad networks described in Section 4, the App contains no links to third-party websites and integrates no third-party SDKs that collect personal data.\n\n---\n\n## 8. Data Security\n\nSince we collect no data, there is no personal data for us to secure or for anyone to breach.\n\n---\n\n## 9. Your Rights\n\nUnder laws such as GDPR, CCPA, and others, you may have rights regarding your personal data (access, deletion, portability, etc.). Because we hold no personal data about you, there is nothing for us to provide, delete, or transfer. If you have questions, you're welcome to contact us and we will confirm this.\n\n---\n\n## 10. Changes to This Policy\n\nIf we update this policy, we will revise the \"Last Updated\" date above. We will notify users of any material changes through the App or the relevant app store listing. Continued use of the App after changes take effect constitutes acceptance of the updated policy.\n\n---\n\n## 11. Contact Us\n\nIf you have any questions about this Privacy Policy, please contact us at:\n\nEmail: [sj@iappsolution.com](mailto:sj@iappsolution.com)\u003cbr/\u003e\nWebsite: [https://iappsolution.com](https://iappsolution.com)\n\n---\n\n_This privacy policy was last reviewed on May 29, 2026._\n\n"}},"__N_SSG":true},"page":"/privacy-policy","query":{},"buildId":"unITxpIWZYsMpVxhW0KG5","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
